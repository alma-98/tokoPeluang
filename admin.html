<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    Dashboard Admin | TokoPeluang
  </title>

  <link
    rel="stylesheet"
    href="css/admin.css?v=1784082373"
  >
</head>

<body class="admin-dashboard-page">

  <aside class="admin-sidebar">

    <a
      href="index.html"
      class="admin-sidebar-brand"
    >
      Toko<span>Peluang</span>
    </a>

    <div class="admin-sidebar-subtitle">
      ADMIN DASHBOARD
    </div>

    <nav class="admin-navigation">

      <button
        class="admin-nav-item active"
        data-filter="all"
      >
        Semua Pembayaran
      </button>

      <button
        class="admin-nav-item"
        data-filter="pending"
      >
        Menunggu Verifikasi
      </button>

      <button
        class="admin-nav-item"
        data-filter="approved"
      >
        Disetujui
      </button>

      <button
        class="admin-nav-item"
        data-filter="rejected"
      >
        Ditolak
      </button>

    </nav>

    <div class="admin-sidebar-footer">

      <a href="index.html">
        ← Kembali ke Website
      </a>

      <button id="adminLogoutButton">
        Keluar
      </button>

    </div>

  </aside>


  <main class="admin-main">

    <header class="admin-topbar">

      <div>

        <div class="admin-label">
          TOKOPELUANG
        </div>

        <h1>
          Verifikasi Pembayaran
        </h1>

      </div>

      <button
        id="adminRefreshButton"
        class="admin-secondary-button"
      >
        Refresh Data
      </button>

    </header>


    <section class="admin-stat-grid">

      <article class="admin-stat-card">

        <span>
          Total
        </span>

        <strong id="totalPaymentCount">
          0
        </strong>

      </article>


      <article class="admin-stat-card pending">

        <span>
          Menunggu
        </span>

        <strong id="pendingPaymentCount">
          0
        </strong>

      </article>


      <article class="admin-stat-card approved">

        <span>
          Disetujui
        </span>

        <strong id="approvedPaymentCount">
          0
        </strong>

      </article>


      <article class="admin-stat-card rejected">

        <span>
          Ditolak
        </span>

        <strong id="rejectedPaymentCount">
          0
        </strong>

      </article>

    </section>


    <section class="admin-content-card">

      <div class="admin-content-header">

        <div>

          <div class="admin-label">
            PAYMENT REQUESTS
          </div>

          <h2>
            Daftar Konfirmasi Pembayaran
          </h2>

        </div>

      </div>


      <div
        id="adminLoading"
        class="admin-loading"
      >
        Memuat pembayaran...
      </div>


      <div
        id="paymentList"
        class="admin-payment-list"
      ></div>


      <div
        id="adminEmptyState"
        class="admin-empty-state"
        hidden
      >
        Belum ada data pembayaran.
      </div>

    </section>

  </main>


  <!-- MODAL BUKTI PEMBAYARAN -->

  <div
    id="paymentModal"
    class="admin-modal"
    hidden
  >

    <div class="admin-modal-backdrop"></div>

    <div class="admin-modal-card">

      <button
        id="closePaymentModal"
        class="admin-modal-close"
      >
        ×
      </button>

      <div class="admin-label">
        BUKTI PEMBAYARAN
      </div>

      <h2 id="modalOpportunityTitle">
        Detail Pembayaran
      </h2>

      <div
        id="modalPaymentDetail"
        class="admin-modal-detail"
      ></div>

      <div class="admin-proof-container">

        <img
          id="modalPaymentProof"
          alt="Bukti pembayaran"
        >

      </div>

      <div class="admin-modal-actions">

        <button
          id="rejectPaymentButton"
          class="admin-reject-button"
        >
          Tolak
        </button>

        <button
          id="approvePaymentButton"
          class="admin-approve-button"
        >
          Setujui Pembayaran
        </button>

      </div>

      <div
        id="modalMessage"
        class="admin-message"
      ></div>

    </div>

  </div>


  <script src="js/admin.js?v=1784082373"></script>

</body>

</html>
